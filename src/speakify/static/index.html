<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakify - PDF to Speech Converter</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <h1 class="brand-title">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 4c-3.9 0-7 2.9-7 6.5 0 2.7 1.7 5 4.2 6l.7 2a.9.9 0 0 0 1.7 0l.5-1.6h1.9c3.9 0 7-2.9 7-6.5S15.9 4 12 4Z" fill="currentColor" opacity="0.95"/>
                <path d="M8.9 9.6h6.1M8.9 12h3.9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M9.1 14.8c1.1.5 2.2.7 2.9.7" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
              </svg>
            </span>
            <span>Speakify</span>
          </h1>
          <a class="settings-toggle-btn icon-btn has-icon icon-settings" href="/settings" aria-label="Open settings">
            <span class="sr-only">Open settings</span>
          </a>
        </div>
        <p>Convert your PDF, DOCX, and TXT documents to speech</p>
      </header>

      <main>
        <div class="workflow-grid">
          <!-- File Upload Section -->
          <section class="card workflow-card">
            <h2> Upload a File</h2>
            <div class="upload-area" id="uploadArea">
              <svg class="upload-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <!-- Book with turned page / page-curl -->
                <rect x="6" y="8" width="40" height="48" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <!-- center spine -->
                <path d="M26 10v44" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <!-- right cover / turned page shape -->
                <path d="M46 10h6v28c0 6-4 10-10 10H38V26c0-6 4-10 8-10z" fill="none" stroke="currentColor" stroke-width="2"/>
                <!-- page curl (fold) -->
                <path d="M46 10c4 0 8 4 8 8v6c0 4-2 6-6 8-2 1-2 3-2 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
                <!-- inner page lines -->
                <g stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.9">
                  <path d="M12 18h22"/>
                  <path d="M12 24h22"/>
                  <path d="M12 30h22"/>
                </g>
              </svg>
              <p>Drag and drop your PDF, DOCX, or TXT file here or click to select</p>
              <input
                type="file"
                id="pdfFile"
                accept=".pdf,.docx,.txt"
                style="display: none"
              />
            </div>
            <button id="uploadBtn" class="btn btn-primary has-icon icon-upload" disabled>
              Upload File
            </button>
            <div id="uploadStatus" class="status-message"></div>
          </section>

          <!-- Convert Section -->
          <section class="card workflow-card" id="convertSection" style="display: none">
            <h2> Convert to Speech</h2>
            <button id="convertBtn" class="btn btn-success has-icon icon-spark" type="button">
              Convert to Speech
            </button>
            <p class="workflow-helper" id="currentSettingsSummary">
              Open Settings to choose pages, voice, rate, and volume.
            </p>
            <div id="convertStatus" class="status-message"></div>
          </section>
        </div>

        <!-- Audio Player Section -->
        <section class="card" id="playerSection" style="display: none">
          <h2>Play Audio</h2>
          <div class="player-controls">
            <button id="playBtn" class="btn btn-control has-icon icon-play" type="button">Play</button>
            <button id="pauseBtn" class="btn btn-control has-icon icon-pause" type="button">Pause</button>
            <button id="stopBtn" class="btn btn-control has-icon icon-stop" type="button">Stop</button>
            <div class="progress-container">
              <span id="currentTime">0:00</span>
              <input type="range" id="progressBar" min="0" value="0" />
              <span id="duration">0:00</span>
            </div>
          </div>
          <audio id="audioPlayer" style="display: none;"></audio>
          <div class="button-group">
            <button id="downloadBtn" class="btn btn-secondary has-icon icon-download" type="button">
              Download Audio
            </button>
            <button id="resetBtn" class="btn btn-secondary has-icon icon-reset" type="button">Start Over</button>
          </div>
        </section>
      </main>

      <footer>
        <p>Speakify &copy; 2024 - Convert PDF to Audio</p>
      </footer>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner" class="spinner" style="display: none"></div>

    <script src="/static/main.js"></script>
  </body>
</html>
